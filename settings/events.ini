; mIRC-Style LLM Chat Simulator - Event Configuration
; This file defines IRC event simulation parameters
; 
; Event types and their frequencies control channel activity
; All frequencies are in seconds (how often events can trigger)
; enabled=true/false controls if event type is active

[join]
enabled = true
frequency = 45
description = Lurker joins channel

[part]
enabled = true
frequency = 60
description = Lurker leaves channel

[quit]
enabled = true
frequency = 90
description = User disconnects from server

[netsplit]
enabled = true
frequency = 300
description = Network split event (5-15 users disconnect)

[topic_change]
enabled = false
frequency = 180
description = Persona changes channel topic

[kick]
enabled = false
frequency = 240
description = Persona kicks another user

[mode]
enabled = true
frequency = 120
description = Operator changes user modes (+o, +v, etc)

[kline]
enabled = false
frequency = 600
description = Server ban announcement

[idle_chatter]
enabled = true
frequency = 30
description = Active personas send random messages
min_interval = 20
max_interval = 60

